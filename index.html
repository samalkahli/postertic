    <style>
        :root {
            --primary: #9c9c9c;
            --bg-deep: #050505;
            --bg-card: #121212;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.08);
            --soft-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            --whatsapp: #25D366;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 60%);
        }

        header {
            text-align: center;
            padding: 20px;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            height: 60px;
            cursor: pointer;
            transition: 0.4s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        .ad-space {
            width: 100%;
            max-width: 900px;
            min-height: 90px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 8px;
        }

        .home-categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px 5% 60px;
        }

        @media (min-width: 768px) {
            .home-categories {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 30px;
            }
        }

        .cat-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1 / 1.2;
            border: 1px solid var(--glass-border);
            background: var(--bg-card);
            transition: 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .cat-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: var(--soft-shadow);
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.65);
            transition: 0.7s ease;
        }

        .cat-card:hover img {
            transform: scale(1.08);
            filter: brightness(0.85);
        }

        .cat-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 5%, transparent 60%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 30px 20px;
        }

        .cat-overlay h2 {
            margin: 0;
            color: #fff;
            font-size: 1.5rem;
            transition: 0.4s;
        }

        .cat-card:hover .cat-overlay h2 {
            transform: translateY(-5px);
        }

        .products-view {
            display: none;
            padding: 20px 5%;
            max-width: 1300px;
            margin: 0 auto;
            animation: fadeSlideUp 0.6s ease-out forwards;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .products-view.active {
            display: block;
        }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #fff;
            color: #000;
        }

        .sub-cats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .sub-cats button {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sub-cats button.active {
            background: #fff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 30px;
            }
        }

        .item {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            background: var(--bg-card);
            animation: fadeSlideUp 0.6s ease-out backwards;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .item:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: var(--soft-shadow);
        }

        .item img {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            display: block;
        }

        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        #lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 35px;
            cursor: pointer;
            z-index: 10000;
            opacity: 0.7;
        }

        .img-container {
            position: relative;
            max-width: 90%;
            max-height: 70vh;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #lightbox.active .img-container {
            transform: scale(1);
        }

        #lightbox-img {
            width: 100%;
            height: 100%;
            max-height: 70vh;
            object-fit: contain;
            display: block;
            position: relative;
            z-index: 1;
            transition: filter 0.4s ease;
        }

        .effect-matte img { filter: contrast(0.98) brightness(0.95) saturate(1); }
        .effect-matte::after {
            content: ""; position: absolute; inset: 0; z-index: 2; opacity: 0.10; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .effect-glossy img { filter: contrast(1.05) brightness(1.02); }
        .effect-glossy::after {
            content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 45%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0) 55%, rgba(255, 255, 255, 0) 100%), linear-gradient(45deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0) 100%);
            background-size: 200% 200%; animation: windowShimmer 8s infinite linear;
        }

        @keyframes windowShimmer {
            0% { background-position: 200% 200%; }
            100% { background-position: -200% -200%; }
        }

        .lightbox-controls { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; align-items: center; width: 90%; max-width: 400px; }
        .effect-toggles { display: flex; background: #1a1a1a; border-radius: 30px; padding: 5px; border: 1px solid var(--glass-border); }
        .effect-btn { background: transparent; border: none; color: #888; padding: 10px 30px; border-radius: 25px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: bold; transition: 0.3s; }
        .effect-btn.active { background: #333; color: #fff; }

        .order-btn {
            background: var(--whatsapp); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: 'Tajawal', sans-serif; display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .float-whatsapp {
            position: fixed; bottom: 30px; left: 30px; background-color: var(--whatsapp); color: white; width: 60px; height: 60px; border-radius: 50px; display: flex; justify-content: center; align-items: center; font-size: 35px; box-shadow: 0px 4px 15px rgba(37, 211, 102, 0.4); z-index: 1000; text-decoration: none; transition: 0.3s;
        }
        .float-whatsapp:hover { transform: scale(1.1); }
    </style>
</head>

<body>

    <header>

    <a href="https://wa.me/966575050509?text=مرحباً! حبيت كم صورة من معرضكم." target="_blank"

            <path
                d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c-.003 1.396.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.004-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z" />

    <div id="lightbox" onclick="closeLightbox(event)">
        <span class="close-lightbox" onclick="closeLightbox(event)">×</span>
        <div class="img-container effect-matte" id="imgWrapper" onclick="event.stopPropagation()">
            <img id="lightbox-img" src="" alt="مكبرة">
        </div>
        <div class="lightbox-controls" onclick="event.stopPropagation()">
            <div class="effect-toggles">
                <button class="effect-btn active" onclick="setEffect('matte', this)">مطفي</button>
                <button class="effect-btn" onclick="setEffect('glossy', this)">لامع</button>
            </div>
            <button class="order-btn" onclick="orderViaWhatsapp()">حبيت هذي الصورة؟ كلمنا على الواتس</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCJWBVYry9VNnxCKynEcxOi5PoKqJjzJWI",
            authDomain: "postertic-bc971.firebaseapp.com",
            projectId: "postertic-bc971",
            storageBucket: "postertic-bc971.firebasestorage.app",
            messagingSenderId: "835487461356",
            appId: "1:835487461356:web:a4e8bad6e48ea1a3a99ac9",
            measurementId: "G-NLY2SS6C4N"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let prods = [], cats = {};

        async function start() {
            const cSnap = await db.collection("categories").get();
            const homeBox = document.getElementById('home');
            let catsArr = [];
            cSnap.forEach(doc => { catsArr.push({ id: doc.id, ...doc.data() }); });
            catsArr.sort((a, b) => (a.order || 0) - (b.order || 0));

            let delay = 0;
            catsArr.forEach(catData => {
                cats[catData.id] = catData;
                homeBox.innerHTML += `
                    <div class="cat-card" style="animation-delay: ${delay}s;" onclick="openCat('${catData.id}')">
                        <img src="${catData.imageUrl}" alt="قسم لوحات ${catData.id}" loading="lazy">
                        <div class="cat-overlay"><h2>${catData.id}</h2></div>
                    </div>`;
                delay += 0.1;
            });
            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            pSnap.forEach(doc => prods.push(doc.data()));
        }

        window.openCat = (id) => {
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('view').classList.add('active');
            document.getElementById('title').innerText = id;
            const subBox = document.getElementById('subs');
            subBox.innerHTML = `<button class="active" onclick="filter('${id}', 'all', event)">الكل</button>`;
            if (cats[id].subs) {
                cats[id].subs.forEach(s => subBox.innerHTML += `<button onclick="filter('${id}', '${s}', event)">${s}</button>`);
            }
            filter(id, 'all');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.filter = (main, sub, e) => {
            if (e) {
                document.querySelectorAll('.sub-cats button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            }
            let filtered = prods.filter(p => p.mainCategory === main);
            if (sub !== 'all') filtered = filtered.filter(p => p.subCategory === sub);
            const gallery = document.getElementById('gallery');
            let delay = 0;
            gallery.innerHTML = filtered.map(p => {
                let html = `<div class="item" style="animation-delay: ${delay}s;" onclick="openLightbox('${p.imageUrl}')"><img src="${p.imageUrl}" alt="لوحة معدنية فخمة - ${p.mainCategory} - ${p.subCategory}" loading="lazy"></div>`;
                delay += 0.05; return html;
            }).join('');
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const imgWrapper = document.getElementById('imgWrapper');
        let currentImgUrl = "";

        window.openLightbox = (imgSrc) => {
            lightboxImg.src = imgSrc;
            currentImgUrl = imgSrc;
            setEffect('matte', document.querySelector('.effect-btn:nth-child(1)'));
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        window.closeLightbox = (e) => {
            if (e && e.target !== lightbox && !e.target.classList.contains('close-lightbox')) return;
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.setEffect = (effectType, btnElement) => {
            document.querySelectorAll('.effect-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            imgWrapper.className = 'img-container';
            if (effectType === 'glossy') imgWrapper.classList.add('effect-glossy');
            else imgWrapper.classList.add('effect-matte');
        }

        window.orderViaWhatsapp = () => {
            const phone = "966575050509";
            const isGlossy = imgWrapper.classList.contains('effect-glossy') ? "لامع" : "مطفي";
            const message = `حبيت هذي الصورة من المعرض:\n${currentImgUrl}\n\nنوع اللوحة: ${isGlossy}`;
            const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && lightbox.classList.contains('active')) {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

        start();
    </script>
</body>
