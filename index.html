    <style>

        .sticky-wrapper { position: sticky; top: 15px; z-index: 1000; display: flex; justify-content: center; padding: 0 15px; margin-bottom: 30px; }
        .floating-header { width: 100%; max-width: 650px; background: rgba(20, 20, 20, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px; display: flex; align-items: center; justify-content: space-between; padding: 8px 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .floating-header.scrolled { max-width: 1200px; background: rgba(10, 10, 10, 0.95); border-color: rgba(203, 162, 106, 0.2); padding: 6px 15px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7); }

        .header-logo { height: 35px; max-width: 0; opacity: 0; margin-left: 0; transform: scale(0.5); transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer; pointer-events: none; }
        .floating-header.scrolled .header-logo { max-width: 140px; opacity: 1; margin-left: 0px; transform: scale(1); pointer-events: auto; }

        .header-search { flex: 1; margin: 0 5px; position: relative; transition: 0.3s; }
        .floating-header.scrolled .header-search { margin: 0 15px; }
        .header-search input { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid transparent; color: #fff; padding: 12px 40px 12px 15px; border-radius: 30px; outline: none; font-family: inherit; font-size: 14px; transition: 0.3s; }
        .header-search input:focus { background: rgba(0, 0, 0, 0.7); border-color: var(--primary-color); }
        .header-search i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-color); font-size: 16px; pointer-events: none; }

        /* زر التطبيق + السلة */
        .header-cart, .install-btn { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; border-radius: 50%; background: rgba(203, 162, 106, 0.1); border: 1px solid rgba(203, 162, 106, 0.3); transition: 0.3s; flex-shrink: 0; }
        .install-btn { margin-left: 5px; }
        .floating-header.scrolled .header-cart, .floating-header.scrolled .install-btn { width: 40px; height: 40px; }

        .header-cart i, .install-btn i { font-size: 20px; color: var(--primary-color); transition: 0.3s; }
        .cart-badge { position: absolute; top: -5px; left: -5px; background: var(--danger); color: #fff; font-size: 11px; font-weight: bold; width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; border-radius: 50%; border: 2px solid #000; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 15px 50px; }

        .home-categories { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .view-header { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px; margin-top: 10px; }

        .back-btn:hover { background: rgba(255,255,255,0.1); }

        /* --- تصميم شريط التصنيفات (ستايل أثنتا) --- */
        .sub-cats-wrapper { position: relative; margin-bottom: 25px; display: flex; justify-content: center; }

        .sub-cats::-webkit-scrollbar { display: none; }
        
        .sub-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-muted); padding: 8px 20px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: 500; font-family: inherit; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .sub-btn.active { background: #ffffff; color: #000; border-color: #ffffff; font-weight: 700; }
        .sub-btn-more { background: rgba(255, 255, 255, 0.05); color: #fff; }
        
        /* القائمة المنسدلة (Dropdown) */
        .dropdown-menu { position: absolute; top: calc(100% + 5px); background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 10px; display: flex; flex-direction: column; gap: 5px; z-index: 100; min-width: 200px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        .dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item { background: transparent; border: none; color: #ccc; padding: 12px 15px; border-radius: 12px; cursor: pointer; text-align: right; font-family: inherit; font-size: 14px; font-weight: 500; transition: 0.2s; display: flex; align-items: center; justify-content: space-between; }
        .dropdown-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .dropdown-item.active { background: rgba(255, 255, 255, 0.1); font-weight: bold; color: #fff; }

        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .gallery { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; } }

        .product-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
        .card-image { width: 100%; height: 220px; background: #111; position: relative; overflow: hidden; cursor: pointer; }
        @media (min-width: 768px) { .card-image { height: 280px; } }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body { padding: 15px; display: flex; flex-direction: column; flex: 1; text-align: center; }
        .card-title { font-size: 14px; font-weight: bold; color: var(--text-main); margin: 0 0 15px 0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 42px; cursor: pointer; }

        .card-actions-row { display: flex; gap: 8px; margin-top: auto; width: 100%; }
        .cart-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 12px; font-weight: 500; font-size: 13px; cursor: pointer; font-family: inherit; transition: 0.3s; }
        .cart-btn:hover { background: #fff; color: #000; }
        .wa-btn { border-color: rgba(255,255,255,0.1); color: #fff; font-size: 18px; }
        .wa-btn:hover { background: var(--whatsapp); border-color: var(--whatsapp); color: #fff; }

        /* سلة المشتريات */
        .cart-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 10001; display: none; opacity: 0; transition: opacity 0.3s; }
        .cart-drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: var(--bg-secondary); z-index: 10002; display: flex; flex-direction: column; transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); border-left: 1px solid var(--glass-border); box-shadow: -10px 0 30px rgba(0, 0, 0, 0.8); }
        .cart-drawer.open { right: 0; }
        .cart-overlay.open { display: block; opacity: 1; }
        .cart-header { padding: 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h2 { margin: 0; font-size: 1.2rem; color: #fff; }
        .close-cart { background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .cart-item { display: flex; gap: 15px; background: var(--card-bg); padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); align-items: center; }
        .cart-item img { width: 60px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #333; }
        .cart-item-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .cart-item-title { font-size: 13px; font-weight: bold; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .effect-pills { display: flex; gap: 8px; }
        .pill { flex: 1; padding: 4px 8px; border-radius: 20px; border: 1px solid #444; background: transparent; color: #888; font-size: 11px; font-weight: bold; cursor: pointer; font-family: inherit; transition: 0.3s; }
        .pill.active { background: #fff; color: #000; border-color: #fff; }
        .delete-item { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; color: var(--danger); font-size: 18px; cursor: pointer; padding: 8px; transition: 0.3s; }
        .delete-item:hover { background: var(--danger); color: #fff; }
        .cart-footer { padding: 20px; border-top: 1px solid var(--glass-border); background: var(--bg-primary); display: flex; flex-direction: column; gap: 10px; }
        .checkout-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 15px; background: var(--whatsapp); color: #fff; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; border: none; font-family: inherit; transition: 0.3s; }
        .checkout-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .checkout-btn:hover:not(:disabled) { filter: brightness(1.1); }
        .empty-cart-msg { text-align: center; color: var(--text-muted); margin-top: 50px; font-size: 15px; }

        /* نافذة العرض (Lightbox) مع إيماءات الجوال */
        #lightbox { position: fixed; inset: 0; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; opacity: 0; transition: opacity 0.3s; }
        #lightbox.active { display: flex; opacity: 1; }
        .close-lb { position: absolute; top: 20px; right: 20px; font-size: 35px; color: #fff; cursor: pointer; z-index: 10000; background: rgba(255,255,255,0.1); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
        
        .img-container { position: relative; max-width: 90%; max-height: 60vh; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); transform: translateY(0); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); touch-action: none; }
        #preview-img { width: 100%; height: 100%; max-height: 60vh; object-fit: contain; display: block; position: relative; z-index: 1; pointer-events: none; }
        
        .effect-matte img { filter: contrast(0.98) brightness(0.95) saturate(1); }
        .effect-matte::after { content: ""; position: absolute; inset: 0; z-index: 2; opacity: 0.10; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        .effect-glossy img { filter: contrast(1.05) brightness(1.02); }
        .effect-glossy::after { content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none; background: linear-gradient(135deg, transparent 0%, transparent 45%, rgba(255, 255, 255, 0.15) 50%, transparent 55%, transparent 100%); background-size: 200% 200%; animation: shine 6s infinite linear; }
        @keyframes shine { 0% { background-position: 200% 200%; } 100% { background-position: -200% -200%; } }
        
        .lb-controls { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 400px; align-items: center; transition: opacity 0.3s; }
        .effect-toggles { display: flex; gap: 10px; width: 100%; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .eff-btn { flex: 1; padding: 12px; border-radius: 25px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: 0.3s; font-weight: bold; }
        .eff-btn.active { color: #000; background: #fff; }
        .s-btn { display: flex; justify-content: center; align-items: center; gap: 8px; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; font-family: inherit; font-size: 15px; transition: 0.3s; }
        .s-btn-solid { background: #fff; color: #000; }
        .s-btn-solid:hover { background: #e0e0e0; }

        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 14px 25px; border-radius: 30px; font-weight: bold; display: none; z-index: 10005; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); font-size: 14px; }
        #loader { display: flex; justify-content: center; padding: 50px; color: var(--primary-color); font-size: 30px; grid-column: 1/-1; align-items: center; height: 40vh;}
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div id="toast" class="toast">تم الإجراء بنجاح ✅</div>

    <div class="top-brand-container">
        <img src="https://firebasestorage.googleapis.com/v0/b/postertic-bc971.firebasestorage.app/o/posters%2F%D8%B3%D8%A7%D9%84%D8%B4%D8%B9%D8%A7%D8%B1%20copy.png?alt=media" alt="POSTERTIC" class="main-big-logo" onclick="location.reload()">
    </div>

    <div class="sticky-wrapper" id="stickyWrapper">
        <div class="floating-header" id="floatingHeader">
            <img src="https://firebasestorage.googleapis.com/v0/b/postertic-bc971.firebasestorage.app/o/posters%2F%D8%B3%D8%A7%D9%84%D8%B4%D8%B9%D8%A7%D8%B1%20copy.png?alt=media" alt="POSTERTIC" class="header-logo" onclick="location.reload()">
            <div class="header-search">
                <input type="text" id="searchInput" placeholder="ابحث عن لوحتك..." oninput="handleSearch()">
                <i class="sicon-search"></i>
            </div>
            
            <div class="install-btn" id="installAppBtn" title="تثبيت التطبيق">

            </div>

            </div>
        </div>
    </div>

    <div class="container">
        <div id="loader"><i class="sicon-spinner spinner"></i></div>

        <div id="home-section" style="display: none;">
            <div class="home-categories" id="homeGrid"></div>
        </div>

        <div class="products-view" id="productsView">
            <div class="view-header">
                <h2 id="catTitle"></h2>
                <button onclick="goHome()" class="back-btn">العودة للأقسام</button>
            </div>
            
            <div class="sub-cats-wrapper">
                <div class="sub-cats" id="catsNav"></div>
                <div id="subCatsDropdown" class="dropdown-menu"></div>
            </div>
            
            <div class="gallery" id="galleryGrid"></div>
        </div>
    </div>

    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>سلة المشتريات 🛒</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItemsContainer"></div>
        <div class="cart-footer">
            <button id="waCheckoutBtn" class="checkout-btn" onclick="checkoutWhatsApp()">
                <i class="sicon-whatsapp2" style="font-size: 22px;"></i> إرسال الطلب عبر واتساب
            </button>
            <button class="checkout-btn" style="background: #fff; color: #000;" onclick="checkoutToStore()">
                <i class="sicon-link" style="font-size: 20px;"></i> نسخ السلة للمتجر
            </button>
        </div>
    </div>

    <div id="lightbox">
        <span class="close-lb" onclick="closeLightbox(event)">×</span>
        <div class="img-container effect-matte" id="imgWrapper">
            <img id="preview-img" src="" alt="لوحة">
        </div>
        <div class="lb-controls" id="lbControls">
            <div class="effect-toggles">
                <button class="eff-btn active" onclick="setEffect('matte', this)">مطفي</button>
                <button class="eff-btn" onclick="setEffect('glossy', this)">لامع</button>
            </div>
            <div style="display:flex; gap:10px; width:100%;">
                <button class="s-btn s-btn-solid" style="flex:2;" onclick="addPreviewToCart()">🛒 عرض التفاصيل</button>
                <button class="s-btn" style="flex:1; background: rgba(255,255,255,0.05); color:#fff; border: 1px solid rgba(255,255,255,0.2);" onclick="orderPreviewWA()"><i class="sicon-whatsapp2"></i></button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCJWBVYry9VNnxCKynEcxOi5PoKqJjzJWI",
            authDomain: "postertic-bc971.firebaseapp.com",
            projectId: "postertic-bc971",
            storageBucket: "postertic-bc971.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        firebase.firestore().enablePersistence().catch(function (err) { console.log("Caching error:", err); });
        const db = firebase.firestore();

        let allProducts = [], categoriesData = {};
        let currentMainCat = 'الكل', currentSubCat = 'الكل';
        let currentImgUrl = "", currentImgTitle = "", currentImgId = "";
        let cart = JSON.parse(localStorage.getItem('postertic_cart')) || [];

        // --- نظام تطبيق الجوال PWA ---
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            } else {
                // إذا كان جوال آيفون أو المتصفح ما يدعم الـ Prompt المباشر
                showToast("للتثبيت 📱: اضغط على زر المشاركة في المتصفح، ثم اختر 'إضافة للشاشة الرئيسية'");
            }
        });
        // ---------------------------------

        window.addEventListener('scroll', () => {
            const header = document.getElementById('floatingHeader');
            if (window.scrollY > 60) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });

        // --- إيماءات الآيفون السلسة (Gestures) ---
        
        // 1. سحب الصورة للأسفل للإغلاق
        const lbImg = document.getElementById('imgWrapper');
        const lbControls = document.getElementById('lbControls');
        let startY = 0, currentY = 0;
        
        lbImg.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
            lbImg.classList.add('no-transition');
        }, { passive: true });
        
        lbImg.addEventListener('touchmove', e => {
            currentY = e.touches[0].clientY;
            let diff = currentY - startY;
            if (diff > 0) { // سحب للأسفل فقط
                lbImg.style.transform = `translateY(${diff}px)`;
                lbControls.style.opacity = Math.max(0, 1 - (diff / 200));
                e.preventDefault(); // منع سحب الصفحة الخلفية
            }
        }, { passive: false });
        
        lbImg.addEventListener('touchend', e => {
            let diff = currentY - startY;
            lbImg.classList.remove('no-transition');
            lbImg.style.transform = '';
            lbControls.style.opacity = '1';
            if (diff > 120) { closeLightbox(); } // إغلاق إذا سحب مسافة كافية
        });

        // 2. سحب من حافة الشاشة اليسرى للعودة للرئيسية
        const prodView = document.getElementById('productsView');
        let edgeStartX = 0, edgeCurrentX = 0;

        prodView.addEventListener('touchstart', e => {
            // تفعيل السحب فقط من أقصى يمين الشاشة (بالعربي) أو يسارها
            if (e.touches[0].clientX < 40 || e.touches[0].clientX > window.innerWidth - 40) {
                edgeStartX = e.touches[0].clientX;
                prodView.classList.add('no-transition');
            } else {
                edgeStartX = 0;
            }
        }, { passive: true });

        prodView.addEventListener('touchmove', e => {
            if (!edgeStartX) return;
            edgeCurrentX = e.touches[0].clientX;
            let diff = Math.abs(edgeCurrentX - edgeStartX);
            if (diff > 10) {
                prodView.style.transform = `translateX(${edgeCurrentX > edgeStartX ? diff : -diff}px)`;
            }
        }, { passive: true });

        prodView.addEventListener('touchend', e => {
            if (!edgeStartX) return;
            let diff = Math.abs(edgeCurrentX - edgeStartX);
            prodView.classList.remove('no-transition');
            prodView.style.transform = '';
            if (diff > 100) { goHome(); } // العودة
            edgeStartX = 0;
        });
        // ---------------------------------

        function updateMetaTags(title, desc, img) {
            document.title = title;
            document.querySelector('meta[name="description"]')?.setAttribute("content", desc);
            document.querySelector('meta[property="og:title"]')?.setAttribute("content", title);
            document.querySelector('meta[property="og:description"]')?.setAttribute("content", desc);
            if (img) document.querySelector('meta[property="og:image"]')?.setAttribute("content", img);
        }

        // --- تسريع التحميل الخيالي ---
        async function initStore() {
            try {
                // 1. جلب وعرض الأقسام فوراً بدون انتظار
                const catSnap = await db.collection("categories").get();
                let catsArr = [];
                catSnap.forEach(doc => { catsArr.push({ id: doc.id, ...doc.data() }); });
                catsArr.sort((a, b) => (a.order || 0) - (b.order || 0));

                let homeHtml = '';
                catsArr.forEach(c => {
                    categoriesData[c.id] = c;
                    homeHtml += `
                        <div class="cat-card" onclick="openCategory('${c.id}')">
                            <img src="${c.imageUrl}" loading="lazy">
                            <div class="cat-overlay"><h2>${c.id}</h2></div>
                        </div>`;
                });
                document.getElementById('homeGrid').innerHTML = homeHtml;
                
                // إخفاء مؤشر التحميل فوراً!
                document.getElementById('loader').style.display = 'none';
                
                const urlParams = new URLSearchParams(window.location.search);
                if (!urlParams.get('c') && !urlParams.get('cat') && !urlParams.get('product')) {
                    document.getElementById('home-section').style.display = 'block';
                }

                // 2. تحميل المنتجات في الخلفية بسلاسة
                db.collection("products").get().then(prodSnap => {
                    allProducts = prodSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    allProducts.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    checkUrlParams(urlParams); // فحص الروابط بعد جلب البيانات
                });

                updateCartUI();

            } catch (error) { document.getElementById('loader').innerHTML = '<p style="color:red; text-align:center;">حدث خطأ في الاتصال.</p>'; }
        }

        function checkUrlParams(urlParams) {
            const shortCartId = urlParams.get('c');
            const sharedCat = urlParams.get('cat');
            const sharedProduct = urlParams.get('product');

            if (shortCartId) {
                db.collection("shared_carts").doc(shortCartId).get().then(docRef => {
                    if (docRef.exists) {
                        cart = docRef.data().items;
                        localStorage.setItem('postertic_cart', JSON.stringify(cart));
                        document.getElementById('cartDrawer').classList.add('open');
                        document.getElementById('cartOverlay').classList.add('open');
                        window.history.replaceState({}, document.title, window.location.pathname);
                        setTimeout(() => showToast("تم استعادة السلة بنجاح! 🛒"), 500);
                    }
                });
            }

            if (sharedProduct) {
                const prod = allProducts.find(p => p.id === sharedProduct);
                if(prod) {
                    if(prod.mainCategory) openCategory(prod.mainCategory); 
                    openLightbox(prod.id, prod.imageUrl, (prod.title_ar || "").replace(/'/g, "\\'"));
                }
            } else if (!shortCartId && sharedCat && categoriesData[sharedCat]) { 
                openCategory(sharedCat); 
            }
        }

        window.goHome = () => {
            document.getElementById('productsView').style.display = 'none';
            document.getElementById('home-section').style.display = 'block';
            document.getElementById('searchInput').value = '';
            
            window.history.pushState({}, '', window.location.pathname);
            updateMetaTags('بوسترتيك | فن يلامس ذوقك', 'اكتشف تشكيلة بوسترتيك الفاخرة.', null);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // --- تصميم القائمة المنسدلة (المزيد ▼) ---
        function updateSubCatUI() {
            const nav = document.getElementById('catsNav');
            const dropdown = document.getElementById('subCatsDropdown');
            
            if (!categoriesData[currentMainCat] || !categoriesData[currentMainCat].subs || categoriesData[currentMainCat].subs.length === 0) {
                nav.innerHTML = ''; dropdown.innerHTML = ''; dropdown.classList.remove('show'); return;
            }

            const allSubs = categoriesData[currentMainCat].subs;
            let visibleSubs = [];
            if (currentSubCat !== 'الكل') visibleSubs.push(currentSubCat); 
            
            for (let s of allSubs) {
                if (visibleSubs.length >= 3) break; 
                if (!visibleSubs.includes(s)) visibleSubs.push(s);
            }
            
            let navHtml = `<button class="sub-btn ${currentSubCat === 'الكل' ? 'active' : ''}" onclick="filterBySub('الكل')">الكل</button>`;
            
            visibleSubs.forEach(s => {
                navHtml += `<button class="sub-btn ${currentSubCat === s ? 'active' : ''}" onclick="filterBySub('${s}')">${s}</button>`;
            });

            if (allSubs.length > visibleSubs.length) {
                navHtml += `<button class="sub-btn sub-btn-more" id="moreSubsBtn" onclick="toggleDropdown(event)">المزيد ▼</button>`;
            }
            nav.innerHTML = navHtml;

            // تعبئة القائمة المنسدلة الزجاجية
            let dropHtml = `<button class="dropdown-item ${currentSubCat === 'الكل' ? 'active' : ''}" onclick="filterBySub('الكل', true)">الكل <i class="sicon-check" style="opacity:${currentSubCat === 'الكل' ? '1' : '0'}"></i></button>`;
            allSubs.forEach(s => {
                const isActive = currentSubCat === s;
                dropHtml += `<button class="dropdown-item ${isActive ? 'active' : ''}" onclick="filterBySub('${s}', true)">${s} <i class="sicon-check" style="opacity:${isActive ? '1' : '0'}"></i></button>`;
            });
            dropdown.innerHTML = dropHtml;
        }

        window.toggleDropdown = (e) => {
            e.stopPropagation();
            document.getElementById('subCatsDropdown').classList.toggle('show');
        };

        window.addEventListener('click', (e) => {
            const dropdown = document.getElementById('subCatsDropdown');
            if(dropdown && dropdown.classList.contains('show') && !e.target.closest('#moreSubsBtn')) {
                dropdown.classList.remove('show');
            }
        });

        window.openCategory = (mainCat) => {
            currentMainCat = mainCat;
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('productsView').style.display = 'block';
            document.getElementById('catTitle').innerText = mainCat;
            document.getElementById('searchInput').value = '';

            window.history.pushState({}, '', '?cat=' + encodeURIComponent(mainCat));
            updateMetaTags(`قسم ${mainCat} | بوسترتيك`, `تصفح تشكيلة ${mainCat}.`, categoriesData[mainCat]?.imageUrl);

            currentSubCat = 'الكل'; 
            updateSubCatUI();
            applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.filterBySub = (subCat, fromDropdown = false) => {
            currentSubCat = subCat;
            updateSubCatUI(); 
            if (fromDropdown) document.getElementById('subCatsDropdown').classList.remove('show');
            applyFilters();
        };

        window.handleSearch = () => {
            if (document.getElementById('home-section').style.display === 'block') {
                currentMainCat = 'الكل'; currentSubCat = 'الكل';
                document.getElementById('home-section').style.display = 'none';
                document.getElementById('productsView').style.display = 'block';
                document.getElementById('catTitle').innerText = "نتائج البحث";
                document.getElementById('catsNav').innerHTML = ''; 
            }
            applyFilters();
        };

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = allProducts.filter(p => {
                const inTitle = (p.title_ar || p.seoTitle || "").toLowerCase().includes(term);
                const matchMain = currentMainCat === 'الكل' || p.mainCategory === currentMainCat;
                const matchSub = currentSubCat === 'الكل' || p.subCategory === currentSubCat;
                return inTitle && matchMain && matchSub;
            });
            renderProducts(filtered);
        }

        function renderProducts(products) {
            const gallery = document.getElementById('galleryGrid');
            if (products.length === 0) { gallery.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 50px;">لا توجد لوحات تطابق بحثك</div>'; return; }

            let html = '';
            products.forEach(p => {
                const title = p.title_ar || p.seoTitle || "لوحة بوسترتيك";
                const cleanTitle = title.replace(/'/g, "\\'");
                html += `
                    <div class="product-card">
                        <div class="card-image" onclick="openLightbox('${p.id}', '${p.imageUrl}', '${cleanTitle}')">
                            <img src="${p.imageUrl}" loading="lazy">
                        </div>
                        <div class="card-body">
                            <h3 class="card-title" onclick="openLightbox('${p.id}', '${p.imageUrl}', '${cleanTitle}')">${title}</h3>
                            <div class="card-actions-row">
                                <button onclick="addToCart('${p.id}', '${cleanTitle}', '${p.imageUrl}', 'مطفي')" class="cart-btn" style="flex:2;">
                                    إضافة للسلة
                                </button>
                                <button onclick="orderSingleWA('${p.id}', '${cleanTitle}', '${p.imageUrl}')" class="cart-btn wa-btn" style="flex:1;">
                                    <i class="sicon-whatsapp2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            gallery.innerHTML = html;
        }

        window.toggleCart = () => { document.getElementById('cartDrawer').classList.toggle('open'); document.getElementById('cartOverlay').classList.toggle('open'); };
        window.addToCart = (id, title, imgUrl, effect) => { cart.push({ id, title, imgUrl, effect }); localStorage.setItem('postertic_cart', JSON.stringify(cart)); updateCartUI(); showToast("تمت الإضافة بنجاح 🛒"); };
        window.removeFromCart = (index) => { cart.splice(index, 1); localStorage.setItem('postertic_cart', JSON.stringify(cart)); updateCartUI(); };
        window.updateItemEffect = (index, newEffect) => { cart[index].effect = newEffect; localStorage.setItem('postertic_cart', JSON.stringify(cart)); updateCartUI(); };

        function updateCartUI() {
            document.getElementById('cartBadgeCount').innerText = cart.length;
            const container = document.getElementById('cartItemsContainer');
            if (cart.length === 0) { container.innerHTML = '<div class="empty-cart-msg">سلتك فارغة حالياً</div>'; return; }
            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <img src="${item.imgUrl}">
                    <div class="cart-item-info">
                        <h4 class="cart-item-title">${item.title}</h4>
                        <div class="effect-pills">
                            <button class="pill ${item.effect === 'مطفي' ? 'active' : ''}" onclick="updateItemEffect(${index}, 'مطفي')">مطفي</button>
                            <button class="pill ${item.effect === 'لامع' ? 'active' : ''}" onclick="updateItemEffect(${index}, 'لامع')">لامع</button>
                        </div>
                    </div>
                    <button class="delete-item" onclick="removeFromCart(${index})"><i class="sicon-trash"></i></button>
                </div>
            `).join('');
        }

        window.sendShortLinkOrder = async (itemsArray, isInquiry = false) => {
            const btn = isInquiry ? null : document.getElementById('waCheckoutBtn');
            if (btn) { btn.innerText = "جاري التجهيز..."; btn.disabled = true; } else { showToast("⏳ جاري التجهيز..."); }

            try {
                const shortId = Math.random().toString(36).substring(2, 8).toUpperCase();
                await db.collection("shared_carts").doc(shortId).set({ items: itemsArray, createdAt: firebase.firestore.FieldValue.serverTimestamp() });

                let shareableUrl = window.location.origin + window.location.pathname + '?c=' + shortId;
                let message = isInquiry ? 
                    `أهلاً بوسترتيك 👋\nحاب استفسر عن:\nالاسم: ${itemsArray[0].title}\nالنوع: ${itemsArray[0].effect}\n🔗 ${shareableUrl}` :
                    `أهلاً بوسترتيك 👋\nحاب أعتمد طلبي:\n🔗 ${shareableUrl}`;
                
                window.open(`https://wa.me/966575050509?text=${encodeURIComponent(message)}`, '_blank');
            } catch (error) { console.error(error); }

            if (btn) { btn.innerHTML = `<i class="sicon-whatsapp2" style="font-size: 22px;"></i> إرسال الطلب عبر واتساب`; btn.disabled = false; }
        };

        window.checkoutWhatsApp = () => { if(cart.length > 0) sendShortLinkOrder(cart, false); };
        window.orderSingleWA = (id, title, url) => { sendShortLinkOrder([{ id, title, imgUrl: url, effect: 'مطفي' }], true); };
        window.orderPreviewWA = () => { 
            const eff = document.getElementById('imgWrapper').classList.contains('effect-glossy') ? "لامع" : "مطفي";
            sendShortLinkOrder([{ id: currentImgId, title: currentImgTitle, imgUrl: currentImgUrl, effect: eff }], true); 
        };
        window.checkoutToStore = () => {
            if (cart.length === 0) return;
            let copyText = "طلباتي:\n";
            cart.forEach((item, i) => { copyText += `(${i + 1}) اللوحة: ${item.title}\nاللمسة: ${item.effect}\n---\n`; });
            navigator.clipboard.writeText(copyText).then(() => {
                showToast("تم نسخ طلباتك! الصقها في المتجر 🔗");
                setTimeout(() => { window.location.href = "https://postertic.com/GYpBZXa"; }, 2000);
            });
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        window.openLightbox = (id, url, title) => {
            currentImgId = id; currentImgUrl = url; currentImgTitle = title;
            document.getElementById('preview-img').src = url;
            setEffect('matte', document.querySelector('.eff-btn:nth-child(1)'));
            document.getElementById('lightbox').classList.add('active');
            window.history.pushState({productId: id}, '', '?product=' + id);
        };

        window.closeLightbox = (e) => {
            if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('close-lb')) return;
            document.getElementById('lightbox').classList.remove('active');
            
            if(currentMainCat !== 'الكل') {
                window.history.pushState({}, '', '?cat=' + encodeURIComponent(currentMainCat));
            } else {
                window.history.pushState({}, '', window.location.pathname);
            }
        };

        window.setEffect = (type, btn) => {
            document.querySelectorAll('.eff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('imgWrapper').className = 'img-container ' + (type === 'glossy' ? 'effect-glossy' : 'effect-matte');
        };

        window.addPreviewToCart = () => {
            const effect = document.getElementById('imgWrapper').classList.contains('effect-glossy') ? "لامع" : "مطفي";
            addToCart(currentImgId, currentImgTitle, currentImgUrl, effect);
            closeLightbox();
        };

        window.onload = initStore;
    </script>
</body>

</html>
