<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوسترتيك | فن يلامس ذوقك</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.salla.network/fonts/sallaicons.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #cba26a;
            --bg-primary: #1d1f1f;
            --bg-secondary: #0e0f0f;
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --primary-color: #cba26a;
            --glass-border: rgba(255, 255, 255, 0.08);
            --soft-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            --whatsapp: #25D366;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            color: var(--text-main);
            background-color: var(--bg-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        header {
            background: var(--bg-secondary);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            height: 45px;
            filter: drop-shadow(0 0 5px var(--primary));
            cursor: pointer;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 5%;
        }

        /* --- الأقسام الرئيسية (خارجياً) --- */
        .home-categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0 60px;
        }

        @media (min-width: 768px) {
            .home-categories {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 30px;
            }
        }

        .cat-card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1 / 1.2;
            border: 1px solid var(--glass-border);
            background: var(--bg-secondary);
        }

        .cat-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-color);
            box-shadow: var(--soft-shadow);
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .cat-card:hover img {
            transform: scale(1.08);
            filter: brightness(0.8);
        }

        .cat-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 5%, transparent 60%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 25px;
        }

        .cat-overlay h2 {
            margin: 0;
            font-size: 1.4rem;
            color: #fff;
        }

        /* --- واجهة عرض المنتجات (داخلياً) --- */
        .products-view {
            display: none;
            animation: fadeSlideUp 0.5s ease-out;
        }

        .products-view.active {
            display: block;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }

        .back-btn:hover {
            background: #fff;
            color: #000;
        }

        /* فلاتر التصنيفات الفرعية */
        .sub-cats {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 20px;
            scrollbar-width: none;
            justify-content: center;
        }

        .sub-cats::-webkit-scrollbar {
            display: none;
        }

        .sub-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: bold;
        }

        .sub-btn.active {
            background: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
        }

        .search-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--bg-secondary);
            color: #fff;
            outline: none;
        }

        /* شبكة اللوحات */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 25px;
            }
        }

        .product-item {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
        }

        .product-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .item-img-box {
            width: 100%;
            height: 320px;
            background: #111;
            overflow: hidden;
        }

        .item-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-info {
            padding: 15px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .item-title {
            font-size: 0.9rem;
            font-weight: bold;
            margin: 0 0 10px;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .order-btn-small {
            background: var(--primary-color);
            color: #000;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            text-decoration: none;
            display: block;
        }

        /* --- نافذة المعاينة (التأثيرات) --- */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: 0.3s;
        }

        #lightbox.active {
            display: flex;
            opacity: 1;
        }

        .close-lb {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 35px;
            color: #fff;
            cursor: pointer;
        }

        .preview-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        #preview-img {
            width: 100%;
            display: block;
        }

        /* تأثير مطفي */
         #lightbox-img {
            width: 100%;
            height: 100%;
            max-height: 60vh;
            object-fit: contain;
            display: block;
            position: relative;
            z-index: 1;
            transition: filter 0.4s ease;
        }

        .effect-matte img {
            filter: contrast(0.98) brightness(0.95) saturate(1);
        }

        .effect-matte::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0.10;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .effect-glossy img {
            filter: contrast(1.05) brightness(1.02);
        }

        .effect-glossy::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.15) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: shine 4s infinite linear;
        }

        @keyframes shine {
            0% {
                background-position: 200% 200%;
            }

            100% {
                background-position: -200% -200%;
            }
        }

        .lb-controls {
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .effect-toggles {
            display: flex;
            gap: 10px;
        }

        .eff-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: none;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
        }

        .eff-btn.active {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(203, 162, 106, 0.1);
        }

        .main-order-btn {
            background: #fff;
            color: #000;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            font-size: 1rem;
        }

        .wa-order-btn {
            border: 1px solid var(--whatsapp);
            color: var(--whatsapp);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
        }

        .skeleton {
            background: linear-gradient(90deg, #1d1f1f 25%, #2a2d2d 50%, #1d1f1f 75%);
            background-size: 200% 100%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            z-index: 10001;
        }
    </style>
</head>

<body>

    <div id="toast" class="toast">تم نسخ الرابط! وجهزنا لك الطلب في المتجر 🔗</div>

    <header>
        <img src="https://i.ibb.co/k20j1Q7c/copy.png" alt="POSTERTIC" class="logo-img" onclick="location.reload()">
    </header>

    <div class="container">
        <div id="home-section">
            <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 25px;">اختر مجموعتك المفضلة ✨
            </h2>
            <div class="home-categories" id="homeGrid"></div>
        </div>

        <div class="products-view" id="productsView">
            <div class="view-header">
                <h2 id="catTitle"></h2>
                <button onclick="location.reload()" class="back-btn">← العودة</button>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="ابحث في هذا القسم (مثلاً: نيمار، خيول)..." onkeyup="searchGallery(this.value)">
            </div>

            <div class="sub-cats" id="subFilters"></div>

            <div class="gallery" id="galleryGrid"></div>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox(event)">
        <span class="close-lb" onclick="closeLightbox(event)">×</span>
        <div class="preview-container effect-matte" id="imgWrapper" onclick="event.stopPropagation()">
            <img id="preview-img" src="" alt="لوحة">
        </div>
        <div class="lb-controls" onclick="event.stopPropagation()">
            <div class="effect-toggles">
                <button class="eff-btn active" onclick="setEffect('matte', this)">مطفي</button>
                <button class="eff-btn" onclick="setEffect('glossy', this)">لامع</button>
            </div>
            <a href="https://postertic.com/GYpBZXa" target="_blank" class="main-order-btn"
                onclick="copyAndRedirect(event)">🛒 اطلب من الموقع مباشرة</a>
            <a href="#" id="waLink" target="_blank" class="wa-order-btn">اطلب عبر واتساب</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCJWBVYry9VNnxCKynEcxOi5PoKqJjzJWI",
            authDomain: "postertic-bc971.firebaseapp.com",
            projectId: "postertic-bc971",
            storageBucket: "postertic-bc971.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allProducts = [], categoriesData = {};
        let currentMainCat = "", currentFilteredList = [];
        let currentImgUrl = "", currentImgTitle = "";

        // تحميل البيانات الأولية
        async function init() {
            // 1. جلب الأقسام
            const cSnap = await db.collection("categories").orderBy("order").get();
            const homeGrid = document.getElementById('homeGrid');
            cSnap.forEach(doc => {
                const data = doc.data();
                categoriesData[doc.id] = data;
                homeGrid.innerHTML += `
                    <div class="cat-card" onclick="openCategory('${doc.id}')">
                        <img src="${data.imageUrl}" loading="lazy">
                        <div class="cat-overlay"><h2>${doc.id}</h2></div>
                    </div>`;
            });

            // 2. جلب كل المنتجات دفعة واحدة للسرعة
            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get();
            pSnap.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
        }

        window.openCategory = (id) => {
            currentMainCat = id;
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('productsView').classList.add('active');
            document.getElementById('catTitle').innerText = id;

            // بناء الفلاتر الفرعية
            const filterBox = document.getElementById('subFilters');
            filterBox.innerHTML = `<button class="sub-btn active" onclick="applyFilter('الكل', this)">الكل</button>`;
            if (categoriesData[id].subs) {
                categoriesData[id].subs.forEach(s => {
                    filterBox.innerHTML += `<button class="sub-btn" onclick="applyFilter('${s}', this)">${s}</button>`;
                });
            }
            applyFilter('الكل');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.applyFilter = (sub, btn) => {
            if (btn) {
                document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            let filtered = allProducts.filter(p => p.mainCategory === currentMainCat);
            if (sub !== 'الكل') filtered = filtered.filter(p => p.subCategory === sub);

            currentFilteredList = filtered;
            renderGallery(filtered);
        };

        function renderGallery(items) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = items.map(p => `
                <div class="product-item" onclick="openLightbox('${p.imageUrl}', '${p.title_ar || 'لوحة بوسترتيك'}')">
                    <div class="item-img-box">
                        <img src="${p.imageUrl}" loading="lazy" alt="${p.title_ar}">
                    </div>
                    <div class="item-info">
                        <h3 class="item-title">${p.title_ar || 'لوحة فنية فاخرة'}</h3>
                        <span class="order-btn-small">اكتشفها الآن ✨</span>
                    </div>
                </div>
            `).join('');
        }

        window.searchGallery = (query) => {
            const term = query.toLowerCase().trim();
            const searched = currentFilteredList.filter(p =>
                (p.title_ar || "").toLowerCase().includes(term) ||
                (p.keys_ar || []).some(k => k.toLowerCase().includes(term))
            );
            renderGallery(searched);
        };

        // --- وظائف Lightbox ---
        window.openLightbox = (url, title) => {
            currentImgUrl = url;
            currentImgTitle = title;
            document.getElementById('preview-img').src = url;
            setEffect('matte', document.querySelector('.eff-btn:nth-child(1)'));

            // تجهيز رابط واتساب
            const msg = encodeURIComponent(`مرحباً بوسترتيك! 👋\nأعجبتني هذه اللوحة وأريد طلبها:\n${title}\nالرابط: ${url}`);
            document.getElementById('waLink').href = `https://wa.me/966575050509?text=${msg}`;

            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeLightbox = (e) => {
            if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('close-lb')) return;
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        window.setEffect = (type, btn) => {
            document.querySelectorAll('.eff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const wrapper = document.getElementById('imgWrapper');
            wrapper.className = 'preview-container ' + (type === 'glossy' ? 'effect-glossy' : 'effect-matte');
        };

        window.copyAndRedirect = (e) => {
            e.preventDefault();
            const effect = document.getElementById('imgWrapper').classList.contains('effect-glossy') ? "لامع" : "مطفي";
            const text = `لوحة: ${currentImgTitle} | النوع: ${effect} | الرابط: ${currentImgUrl}`;

            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { window.location.href = "https://postertic.com/GYpBZXa"; }, 2000);
            });
        };

        init();
    </script>
</body>

</html>
