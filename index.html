<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوسترتيك | فن يلامس ذوقك</title>
    
    <meta name="description" content="اكتشف تشكيلة بوسترتيك الفاخرة من اللوحات المعدنية الجدارية بلمسات مطفية ولامعة.">
    <meta name="keywords" content="لوحات معدنية, بوسترات قيمنق, ديكور جداري, بوسترتيك, Postertic">

    <meta property="og:title" content="بوسترتيك | معرض الصور والمنتجات 🛒">
    <meta property="og:description" content="مرحباً بك في بوسترتيك. افتح الرابط لاستعراض اللوحات المعدنية المختارة واعتماد الطلب.">
    <meta property="og:image" content="images/iconPos2.png">
    <meta property="og:type" content="website">

    <link rel="icon" id="dynamicFavicon" type="image/png" href="images/iconPos2.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1d1f1f">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.salla.network/fonts/sallaicons.css">

    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

    <div id="toast" class="toast">تم الإجراء بنجاح ✅</div>
    <div id="sizePopup" class="size-popup"></div>

    <div class="top-brand-container">
        <img src="images/logoPos.png" alt="POSTERTIC" class="main-big-logo" onclick="goHome()">
    </div>

    <div class="sticky-wrapper" id="stickyWrapper">
        <div class="floating-header" id="floatingHeader">
            <img src="images/logoPos.png" alt="POSTERTIC" class="header-logo" onclick="goHome()">
            <div class="header-search">
                <input type="text" id="searchInput" placeholder="ابحث عن لوحتك..." oninput="handleSearch()">
                <i class="sicon-search"></i>
            </div>
            
            <div class="install-btn" id="installAppBtn" title="تثبيت التطبيق">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                    <path d="M12 14v-4"></path>
                    <polyline points="10 12 12 14 14 12"></polyline>
                </svg>
            </div>

            <div class="header-cart" onclick="toggleCart()">
                <i class="sicon-shopping-bag"></i>
                <div class="cart-badge" id="cartBadgeCount">0</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="loader"><i class="sicon-spinner spinner"></i></div>

        <div id="home-section" style="display: none;">
            <div class="home-categories" id="homeGrid"></div>
        </div>

        <div class="products-view" id="productsView">
            <div class="view-header">
                <h2 id="catTitle" style="margin: 0; color: var(--primary-color);"></h2>
                <button onclick="goHome()" class="back-btn">← الرئيسية</button>
            </div>
            
            <div class="sub-cats-wrapper">
                <div class="sub-cats" id="catsNav"></div>
                <div id="subCatsDropdown" class="dropdown-menu"></div>
            </div>
            
            <div class="gallery" id="galleryGrid"></div>
        </div>
    </div>

    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>سلة المشتريات 🛒</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItemsContainer"></div>
        <div class="cart-footer">
            <button id="waCheckoutBtn" class="checkout-btn" onclick="checkoutWhatsApp()">
                <i class="sicon-whatsapp2" style="font-size: 22px;"></i> إتمام الطلب عبر الواتس
            </button>
            <button class="checkout-btn" style="background: #fff; color: #000;" onclick="checkoutToStore()">
                <i class="sicon-link" style="font-size: 20px;"></i> إتمام الطلب والدفع عبر المتجر
            </button>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox(event)">
        <span class="close-lb" onclick="closeLightbox(event)">×</span>
        <div class="img-container effect-matte" id="imgWrapper" onclick="event.stopPropagation()">
            <img id="preview-img" src="" alt="لوحة">
        </div>
        
        <div class="lb-controls" id="lbControls" onclick="event.stopPropagation()">
            <div class="size-pills" id="lbSizeContainer"></div>
            
            <div id="lbPriceDisplay" style="text-align: center; margin-bottom: 12px;"></div>

            <div class="effect-toggles" id="lbEffectToggles" style="margin-bottom: 15px;"></div>
            
            <div style="display:flex; gap:10px; width:100%;">
                <button class="s-btn s-btn-solid" style="flex:2;" onclick="addPreviewToCart()">🛒 إضافة الطلب للسلة</button>
                <button class="s-btn wa-btn" style="flex:1;" onclick="orderPreviewWA()"><i class="sicon-whatsapp2"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
