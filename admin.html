<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة بوسترتيك PRO | التحكم الشامل</title>
    
    <link rel="stylesheet" href="admin-style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>

<body>
    <div id="pBarContainer">
        <div id="pBar"></div>
    </div>
    <div id="toast" class="toast"></div>

    <div id="reviewModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔍 مراجعة وتصفية اللوحات (<span id="reviewCount">0</span>)</h3>
                <button class="modal-close" onclick="closeReviewModal()">×</button>
            </div>
            <div class="modal-body" id="reviewGrid"></div>
            <div class="modal-footer">
                <button class="action-btn" id="confirmReviewBtn" onclick="executePinterestBulk()">تحليل ورفع المتبقي لـ Firebase ✨</button>
                <button class="danger-btn" style="width: 150px; padding: 15px;" onclick="closeReviewModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <header>
        <button class="logout-btn" onclick="logout()">خروج</button>
        <img src="https://i.ibb.co/k20j1Q7c/copy.png" class="logo">
    </header>

    <div class="tabs">
        <button class="active" onclick="switchTab(event, 'productsTab')">📦 المنتجات</button>
        <button onclick="switchTab(event, 'catsTab')">📂 الأقسام</button>
        <button onclick="switchTab(event, 'inventoryTab')">📊 المخزون</button>
    </div>

    <div id="productsTab" class="tab-content active">
        <div class="admin-box" style="border: 1px solid var(--primary);">
            <h2 style="color: var(--primary);">السحب الذكي من بينترست 🚀</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <select id="pinMainCat" onchange="loadSubCats('pinMainCat', 'pinSubCat')"></select>
                <select id="pinSubCat"></select>
            </div>
            <textarea id="pinJsonData" rows="3" placeholder="الصق حزمة البيانات من الزر العائم هنا..."></textarea>
            <button class="action-btn" id="pinBtn" onclick="previewPinterestBulk()">استعراض ومراجعة الحزمة 🧐</button>
        </div>

        <div class="admin-box">
            <h2>إضافة لوحات يدوية <small style="font-size: 10px; color: var(--primary); float: left;">V3 PRO</small></h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <select id="productMainCat" onchange="loadSubCats('productMainCat', 'productSubCat')"></select>
                <select id="productSubCat"></select>
            </div>
            <div style="border: 2px dashed #444; padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; margin: 15px 0;" onclick="document.getElementById('productFile').click()">
                <span id="fileLabel">اسحب الصور هنا أو اضغط للاختيار 🖼️</span>
                <input type="file" id="productFile" multiple accept="image/*" style="display:none;" onchange="updateLabel(this)">
            </div>
            <div class="ai-toggle">
                <input type="checkbox" id="useAI" checked style="width: 22px; height: 22px; cursor: pointer;">
                <label for="useAI" style="cursor: pointer; font-weight: bold;">تفعيل التحليل الذكي (OpenAI) ✨</label>
            </div>
            <button class="action-btn" style="background:#222; color:#fff; border:1px solid #444;" id="prodBtn" onclick="saveManualProducts()">رفع ومعالجة يدوي 🚀</button>
        </div>

        <div class="admin-box" style="padding: 10px; background: transparent; border: none; display: flex; justify-content: space-between; align-items: center;">
            <span><input type="checkbox" id="selectAll" onchange="toggleAll(this)"> تحديد الكل</span>
            <button class="danger-btn" onclick="bulkDelete()">حذف اللوحات المحددة</button>
        </div>

        <div id="productsList"></div>
    </div>

    <div id="catsTab" class="tab-content">
        <div class="admin-box">
            <h2>إضافة قسم رئيسي</h2>
            <input type="text" id="catName" placeholder="اسم القسم">
            <input type="number" id="catOrder" placeholder="ترتيب الظهور">
            <div style="border: 1px dashed var(--brd); padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 12px; background: #111;">
                <label for="catImageInput" style="cursor: pointer; display: block; color: #888;" id="catImageLabel">📷 اضغط هنا لاختيار صورة (اختياري)</label>
                <input type="file" id="catImageInput" accept="image/*" style="display:none;" onchange="document.getElementById('catImageLabel').innerText = 'تم اختيار الصورة ✅'">
            </div>
            <button class="save-btn" id="saveCatBtn" style="width: 100%;" onclick="saveCat()">حفظ القسم</button>
        </div>
        <div id="categoriesAdminList" class="cat-list-container">
    </div>
    </div>

    <div id="inventoryTab" class="tab-content">
        <div class="admin-box">
            <h2>📊 إضافة / تعديل مخزون</h2>
            <input type="hidden" id="invId">
            <input type="text" id="invName" placeholder="اسم اللوحة / المخزون (مثال: لوحة ريال مدريد الكلاسيكية)">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <input type="number" id="invPriceBefore" placeholder="السعر قبل التخفيض (مثال: 150)">
                <input type="number" id="invPriceAfter" placeholder="السعر بعد التخفيض (مثال: 99)">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                <input type="number" id="invWidthIn" placeholder="العرض (بالإنش)">
                <input type="number" id="invHeightIn" placeholder="الطول (بالإنش)">
            </div>
            
            <div class="inventory-checkbox-group">
                <label>
                    <input type="checkbox" id="invMatte"> اللمسة: مطفي ✅
                </label>
                <label>
                    <input type="checkbox" id="invGlossy"> اللمسة: لامع ✨
                </label>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" style="flex: 1;" onclick="saveInventory()">حفظ في المخزون 💾</button>
                <button class="danger-btn" style="padding: 15px;" onclick="clearInvForm()">تفريغ</button>
            </div>
        </div>

        <div class="admin-box" style="background: transparent; border: none; padding: 0;">
            <h3 style="color: var(--primary); margin-top: 0;">المخزون الحالي:</h3>
            <div id="inventoryList"></div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
