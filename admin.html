<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة بوسترتيك PRO | لوحة التحكم الذكية</title>
    <link rel="icon" href="https://i.ibb.co/tpGvm9W5/0-copy.jpg" type="image/jpeg">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        :root {
            --primary: #cba26a;
            --background: #080808;
            --card-bg: #121212;
            --text-main: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            margin: 0;
            color: var(--text-main);
            padding-bottom: 50px;
            display: none;
        }

        header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: #000;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            height: 50px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .logout-btn {
            position: absolute;
            left: 15px;
            top: 20px;
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }

        .tabs button {
            background: transparent;
            border: 1px solid var(--border);
            color: #888;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
            font-family: inherit;
            transition: 0.3s;
        }

        .tabs button.active {
            background: var(--primary);
            color: #000;
            font-weight: bold;
            border-color: var(--primary);
        }

        .tab-content {
            display: none;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        h2 {
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            color: var(--primary);
            margin-top: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        select,
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: #000;
            color: #fff;
            margin-bottom: 12px;
            font-family: inherit;
            font-size: 14px;
        }

        .drop-zone {
            border: 2px dashed #333;
            padding: 30px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            background: #0a0a0a;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: #111;
        }

        .action-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .action-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .bulk-actions {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .accordion-btn {
            background: #1a1a1a;
            color: var(--primary);
            cursor: pointer;
            padding: 15px;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .accordion-content {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s ease-out;
            padding: 0 10px;
        }

        .list-item {
            background: #151515;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #222;
            margin-top: 10px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .item-img {
            width: 90px;
            height: 110px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .item-details {
            flex: 1;
            min-width: 250px;
        }

        .save-btn {
            background: #1b5e20;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 5px;
            width: 100%;
            font-weight: bold;
        }

        .danger-btn {
            background: #b71c1c;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        #uploadProgress {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #000;
            z-index: 2000;
            display: none;
        }

        #pBar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            transition: 0.3s;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: #000;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            z-index: 3000;
        }

        .ai-badge {
            background: linear-gradient(45deg, #FF007A, #7A00FF);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
        }
    </style>
</head>

<body>

    <div id="uploadProgress">
        <div id="pBar"></div>
    </div>
    <div id="toast" class="toast">تم الإجراء بنجاح! ✅</div>

    <header>
        <button class="logout-btn" onclick="logout()">خروج</button>
        <img src="https://i.ibb.co/k20j1Q7c/copy.png" class="logo">
    </header>

    <div class="tabs">
        <button class="active" onclick="switchTab(event, 'productsTab')">اللوحات</button>
        <button onclick="switchTab(event, 'catsTab')">الأقسام</button>
    </div>

    <div id="productsTab" class="tab-content active">
        <div class="admin-box">
            <h2>إضافة لوحات جديدة <span class="ai-badge">PRO AI ACTIVE</span></h2>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <select id="productMainCat" onchange="loadSubCats('productMainCat', 'productSubCat')"></select>
                <select id="productSubCat"></select>
            </div>
            <div class="drop-zone" onclick="document.getElementById('productFile').click()">
                <span id="fileLabel">اسحب الصور هنا أو اضغط للاختيار 📸</span>
                <input type="file" id="productFile" multiple accept="image/*" style="display:none;"
                    onchange="updateLabel(this)">
            </div>
            <button class="action-btn" id="prodBtn" onclick="saveProducts()">تحليل ورفع اللوحات 🚀</button>
        </div>

        <div class="bulk-actions">
            <div><input type="checkbox" id="selectAll" onchange="toggleAll(this)"> <label for="selectAll">تحديد
                    الكل</label></div>
            <button class="danger-btn" style="width:auto; padding: 8px 20px;" onclick="bulkDelete()">حذف
                المحددة</button>
        </div>

        <div id="productsList"></div>
    </div>

    <div id="catsTab" class="tab-content">
        <div class="admin-box">
            <h2>إنشاء قسم رئيسي</h2>
            <input type="text" id="catName" placeholder="اسم القسم (مثلاً: أنمي)">
            <input type="number" id="catOrder" placeholder="ترتيب الظهور">
            <input type="file" id="catImg">
            <button class="action-btn" onclick="saveCat()">حفظ القسم</button>
        </div>
        <div id="categoriesAdminList"></div>
    </div>

    <script>
        // إعدادات قاعدة البيانات
        const firebaseConfig = {
            apiKey: "AIzaSyCJWBVYry9VNnxCKynEcxOi5PoKqJjzJWI",
            authDomain: "postertic-bc971.firebaseapp.com",
            projectId: "postertic-bc971",
            storageBucket: "postertic-bc971.firebasestorage.app",
            messagingSenderId: "835487461356",
            appId: "1:835487461356:web:a4e8bad6e48ea1a3a99ac9",
            measurementId: "G-NLY2SS6C4N"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore(), auth = firebase.auth();

        // تسجيل الدخول
        auth.onAuthStateChanged(u => { if (u) { document.body.style.display = 'block'; init(); } else window.location.href = 'login.html'; });
        function logout() { auth.signOut().then(() => window.location.href = 'login.html'); }

        // دوال مساعدة
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function updateLabel(i) { document.getElementById('fileLabel').innerText = `تم اختيار ${i.files.length} صور 📸`; }

        // ضغط الصور
        async function compress(file) {
            return new Promise(res => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width; if (w > 900) w = 900;
                        canvas.height = Math.round((img.height * w) / img.width);
                        canvas.width = w;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob(b => res(new File([b], file.name, { type: 'image/jpeg' })), 'image/jpeg', 0.75);
                    };
                };
            });
        }

        // الاتصال بسكربت البايثون للتحليل
        async function getAI(file, subCategory) { // أضفنا المتغير هنا
            const base64 = await new Promise(res => {
                const r = new FileReader();
                r.onloadend = () => res(r.result.split(',')[1]);
                r.readAsDataURL(file);
            });

            try {
                const r = await fetch(`https://postertic.onrender.com/analyze`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        image: base64,
                        sub_category: subCategory // نرسل التصنيف للبايثون
                    })
                });

                // ... باقي الكود نفسه

                if (!r.ok) {
                    const errText = await r.text();
                    try {
                        const errData = JSON.parse(errText);
                        throw new Error(errData.error || "خطأ داخلي في السيرفر");
                    } catch (e) {
                        throw new Error(`تعذر الاتصال بالسيرفر: ${r.status}`);
                    }
                }

                const data = await r.json();
                console.log("تم التحليل بنجاح:", data);
                return data;

            } catch (e) {
                console.error("تفاصيل الخطأ:", e);
                return { failed: true, errorMsg: "تأكد إن سكربت البايثون (server.py) شغال! \n\nتفاصيل: " + e.message };
            }
        }

        // 1. دالة استخراج البصمة الرقمية (Hash) للصورة
        async function getFileHash(file) {
            const arrayBuffer = await file.arrayBuffer();
            const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 2. دالة الرفع الأساسية المعدلة
        window.saveProducts = async () => {
            const m = document.getElementById('productMainCat').value,
                s = document.getElementById('productSubCat').value,
                files = document.getElementById('productFile').files;

            if (!m || files.length === 0) return alert("الرجاء اختيار القسم وتحديد صورة على الأقل.");

            const btn = document.getElementById('prodBtn');
            btn.disabled = true;
            document.getElementById('uploadProgress').style.display = 'block';

            let skippedCount = 0; // عداد للصور المكررة

            for (let i = 0; i < files.length; i++) {
                btn.innerText = `🤖 جاري الفحص والتحليل ${i + 1}/${files.length}...`;

                // فحص التكرار عبر البصمة الرقمية قبل أي شيء!
                let fileHash = await getFileHash(files[i]);
                let checkDuplicate = await db.collection("products").where("imageHash", "==", fileHash).get();

                if (!checkDuplicate.empty) {
                    console.log(`تم تخطي [ ${files[i].name} ] لأنها مرفوعة مسبقاً.`);
                    skippedCount++;
                    document.getElementById('pBar').style.width = ((i + 1) / files.length * 100) + '%';
                    continue; // تخطى الصورة ورح للي بعدها فوراً
                }

                // إذا الصورة جديدة، نكمل المعالجة
                let f = await compress(files[i]);
                let ai = await getAI(f, s); // 's' هو متغير التصنيف الفرعي الموجود أصلاً في الدالة        
                if (ai && ai.failed) {
                    const confirmUpload = confirm(`⚠️ فشل تحليل الصورة: ${files[i].name}\n\n${ai.errorMsg}\n\nاستمرار بدون وصف ذكي؟`);
                    if (!confirmUpload) {
                        alert("تم إيقاف العملية.");
                        document.getElementById('uploadProgress').style.display = 'none';
                        btn.disabled = false; btn.innerText = "تحليل ورفع اللوحات 🚀";
                        return;
                    } else {
                        ai = { title: "لوحة معدنية فخمة", desc: "تصميم عصري مميز", keys: ["لوحة", "ديكور"] };
                    }
                }

                // رفع لـ ImgBB
                let fd = new FormData(); fd.append('image', f);
                let r = await fetch(`https://api.imgbb.com/1/upload?key=816caf2f4d88877a363c996e0365fdb2`, { method: 'POST', body: fd });
                let d = await r.json();

                // الحفظ في قاعدة البيانات مع (البصمة الرقمية)
                await db.collection("products").add({
                    mainCategory: m,
                    subCategory: s || "عام",
                    imageUrl: d.data.display_url,
                    imageHash: fileHash, // حفظ البصمة عشان نقارن فيها المرات الجاية
                    seoTitle: ai ? ai.title : "",
                    seoDescription: ai ? ai.desc : "",
                    seoKeywords: ai ? ai.keys : [],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('pBar').style.width = ((i + 1) / files.length * 100) + '%';

                // خلينا الانتظار نصف ثانية فقط للسرعة، لأن البايثون صار يتصرف لو صار ضغط
                if (i < files.length - 1) await new Promise(resolve => setTimeout(resolve, 500));
            }

            // رسالة نهائية توضح كم صورة انرفعت وكم تخطينا
            if (skippedCount > 0) {
                showToast(`تم الانتهاء! ✅ (تم رفع ${files.length - skippedCount} وتخطي ${skippedCount} مكررة)`);
            } else {
                showToast("تم الرفع بنجاح! ✅");
            }

            setTimeout(() => location.reload(), 2000);
        };

        // دوال التحكم باللوحات والأقسام
        window.toggleAll = c => document.querySelectorAll('.prod-cb').forEach(x => x.checked = c.checked);
        window.bulkDelete = async () => {
            const sels = document.querySelectorAll('.prod-cb:checked');
            if (sels.length === 0 || !confirm(`حذف ${sels.length} لوحة؟`)) return;
            for (let x of sels) await db.collection("products").doc(x.value).delete();
            init();
        };

        window.updateSEO = async id => {
            const t = document.getElementById(`t_${id}`).value, d = document.getElementById(`d_${id}`).value, k = document.getElementById(`k_${id}`).value.split('،').map(x => x.trim());
            await db.collection("products").doc(id).update({ seoTitle: t, seoDescription: d, seoKeywords: k });
            showToast("تم التحديث! 💾");
        };

        window.switchTab = (e, id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); e.target.classList.add('active');
        };

        window.toggleAccordion = b => {
            const c = b.nextElementSibling;
            c.style.maxHeight = c.style.maxHeight ? null : "15000px";
        };

        let siteCats = {};
        window.loadSubCats = (mId, sId) => {
            const m = document.getElementById(mId).value, s = document.getElementById(sId);
            s.innerHTML = '<option value="">(بدون فرعي)</option>';
            if (m && siteCats[m]) siteCats[m].subs.forEach(sub => s.innerHTML += `<option value="${sub}">${sub}</option>`);
        };

        // دالة التهيئة عند فتح الصفحة
        async function init() {
            const cSnap = await db.collection("categories").get(), pM = document.getElementById('productMainCat'), cL = document.getElementById('categoriesAdminList');
            pM.innerHTML = '<option value="">اختر القسم</option>'; cL.innerHTML = ''; siteCats = {};
            let catsArr = []; cSnap.forEach(doc => catsArr.push({ id: doc.id, ...doc.data() }));
            catsArr.sort((a, b) => (a.order || 0) - (b.order || 0)).forEach(c => {
                siteCats[c.id] = c; pM.innerHTML += `<option value="${c.id}">${c.id}</option>`;
                cL.innerHTML += `<div class="list-item" style="justify-content:space-between;"><strong>${c.id}</strong> <button class="danger-btn" style="width:auto;" onclick="db.collection('categories').doc('${c.id}').delete().then(init)">حذف</button></div>`;
            });

            const pSnap = await db.collection("products").orderBy("timestamp", "desc").get(), pL = document.getElementById('productsList');
            let grouped = {}; pSnap.forEach(doc => {
                let p = doc.data(); p.id = doc.id;
                let m = p.mainCategory || "عام", s = p.subCategory || "عام";
                if (!grouped[m]) grouped[m] = {}; if (!grouped[m][s]) grouped[m][s] = []; grouped[m][s].push(p);
            });
            pL.innerHTML = Object.keys(grouped).map(m => `
                <button class="accordion-btn" onclick="toggleAccordion(this)">${m} <span>▼</span></button>
                <div class="accordion-content">${Object.keys(grouped[m]).map(s => `
                    <button class="accordion-btn" style="background:#111; font-size:14px;" onclick="toggleAccordion(this)">${s} (${grouped[m][s].length}) <span>▼</span></button>
                    <div class="accordion-content">${grouped[m][s].map(p => `
                        <div class="list-item">
                            <input type="checkbox" class="prod-cb" value="${p.id}">
                            <img src="${p.imageUrl}" class="item-img">
                            <div class="item-details">
                                <input type="text" id="t_${p.id}" value="${p.seoTitle || ''}" placeholder="العنوان">
                                <textarea id="d_${p.id}" rows="2" placeholder="الوصف">${p.seoDescription || ''}</textarea>
                                <input type="text" id="k_${p.id}" value="${(p.seoKeywords || []).join('، ')}" placeholder="الكلمات">
                                <div style="display:flex; gap:10px;"><button class="save-btn" onclick="updateSEO('${p.id}')">حفظ</button>
                                <button class="danger-btn" onclick="db.collection('products').doc('${p.id}').delete().then(init)">حذف</button></div>
                            </div>
                        </div>`).join('')}</div>`).join('')}</div>`).join('');
        }
    </script>
</body>

</html>
